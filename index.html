  .main { padding: 16px; max-width: 680px; margin: 0 auto; }

  .tag-essay { background: #faf5ff; color: #805ad5; }
  .tag-chapter { background: #f7fafc; color: #718096; }
  .q-text { font-size: 16px; line-height: 1.7; color: #2d3748; font-weight: 500; }

  .judge-btn.correct { border-color: #38a169; background: #f0fff4; }
  .judge-btn.wrong { border-color: #e53e3e; background: #fff5f5; }

// ==================== 状态 ====================
let state = {
  filter: 'all',
  questions: [],
  currentIndex: 0,
  score: 0,
  total: 0,
  answered: false
};

function getFilteredQuestions() {
  let qs = state.filter === 'all' ? [...QUESTIONS] : QUESTIONS.filter(q => q.chapter === state.filter);
  // Fisher-Yates shuffle
  for (let i = qs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [qs[i], qs[j]] = [qs[j], qs[i]];
  }
  return qs;
}

function init() {
  state.questions = getFilteredQuestions();
  state.currentIndex = 0;
  state.score = 0;
  state.total = state.questions.length;
  state.answered = false;
  document.getElementById('summary').classList.remove('visible');
  updateProgress();
  renderQuestion();
}

function restart() {
  init();
}

function updateProgress() {
  const q = state.currentIndex;
  const t = state.total;
  document.getElementById('progressText').textContent = `第 ${q + 1} 题 / 共 ${t} 题`;
  document.getElementById('scoreText').textContent = `得分：${state.score}`;
  const pct = t > 0 ? (q / t) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function typeLabel(type) {
  const map = { single: '单选题', judge: '判断题', fill: '填空题', essay: '简答题' };
  return map[type] || type;
}

function typeClass(type) {
  const map = { single: 'tag-single', judge: 'tag-judge', fill: 'tag-fill', essay: 'tag-essay' };
  return map[type] || '';
}

function chapterLabel(ch) {
  const map = { ch1: '第一章·学情', ch2: '第二章·产品', ch3: '第三章·亮点', ch4: '第四章·竞品' };
  return map[ch] || ch;
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (state.currentIndex >= state.total) {
    showSummary();
    area.innerHTML = '';
    return;
  }
  state.answered = false;
  const q = state.questions[state.currentIndex];
  updateProgress();

  let inputHtml = '';
  if (q.type === 'single') {
    inputHtml = `<div class="options">${q.options.map((opt, i) =>
      `<button class="option-btn" data-idx="${i}" onclick="answerSingle(this,${i})">${opt}</button>`
    ).join('')}</div>`;
  } else if (q.type === 'judge') {
    inputHtml = `<div class="judge-btns">
      <button class="judge-btn" onclick="answerJudge(this,true)">✅ 正确</button>
      <button class="judge-btn" onclick="answerJudge(this,false)">❌ 错误</button>
    </div>`;
  } else if (q.type === 'fill') {
    inputHtml = `<div class="fill-area">
      <input type="text" class="fill-input" id="fillInput" placeholder="请输入答案..." onkeydown="if(event.key==='Enter')submitFill()">
      <button class="fill-submit" onclick="submitFill()">提交答案</button>
    </div>`;
  } else if (q.type === 'essay') {
    inputHtml = `<div class="essay-area">
      <button class="show-answer-btn" onclick="showEssayAnswer(this)">💡 查看参考答案</button>
      <div class="answer-box" id="essayBox">${q.answer.replace(/\n/g,'<br>')}</div>
      <div class="self-judge" id="selfJudge">
        <button class="self-btn self-correct" onclick="selfScore(true)">✅ 我答对了</button>
        <button class="self-btn self-wrong" onclick="selfScore(false)">❌ 我没答出来</button>
      </div>
    </div>`;
  }

  area.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag ${typeClass(q.type)}">${typeLabel(q.type)}</span>
        <span class="q-tag tag-chapter">${chapterLabel(q.chapter)}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${inputHtml}
      <div class="feedback" id="feedback"></div>
    </div>
    ${q.type !== 'essay' ? `<button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>` : ''}
  `;
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById('feedback');
  fb.className = `feedback visible ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `<div class="feedback-label">${correct ? '✅ 回答正确！' : '❌ 回答错误'}</div>
    <div class="explanation">📖 解析：${explanation}</div>`;
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.classList.add('visible');
}

function answerSingle(btn, idx) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const correct = idx === q.answer;
  if (correct) {
    btn.classList.add('correct');
    state.score++;
  } else {
    btn.classList.add('wrong');
    btns[q.answer].classList.add('reveal');
  }
  document.getElementById('scoreText').textContent = `得分：${state.score}`;
  showFeedback(correct, q.explanation);
}

function answerJudge(btn, val) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const btns = document.querySelectorAll('.judge-btn');
  btns.forEach(b => b.disabled = true);
  const correct = val === q.answer;
  btn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    btns[q.answer ? 0 : 1].classList.add('correct');
  }
  if (correct) state.score++;
  document.getElementById('scoreText').textContent = `得分：${state.score}`;
  showFeedback(correct, q.explanation);
}

function submitFill() {
  if (state.answered) return;
  const input = document.getElementById('fillInput');
  const val = input.value.trim();
  if (!val) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const btn = input.nextElementSibling;
  btn.disabled = true;
  input.disabled = true;
  const normalize = s => s.replace(/\s/g, '').toLowerCase();
  const correct = q.answers.some(a => normalize(val) === normalize(a));
  input.classList.add(correct ? 'correct' : 'wrong');
  if (correct) state.score++;
  document.getElementById('scoreText').textContent = `得分：${state.score}`;
  if (!correct) {
    const hint = document.createElement('div');
    hint.style.cssText = 'margin-top:8px;font-size:13px;color:#718096;';
    hint.textContent = `参考答案：${q.answers[0]}`;
    btn.parentNode.insertBefore(hint, btn.nextSibling);
  }
  showFeedback(correct, q.explanation);
}

function showEssayAnswer(btn) {
  btn.style.display = 'none';
  document.getElementById('essayBox').classList.add('visible');
  document.getElementById('selfJudge').classList.add('visible');
}

function selfScore(correct) {
  if (state.answered) return;
  state.answered = true;
  const btns = document.querySelectorAll('.self-btn');
  btns.forEach(b => b.disabled = true);
  if (correct) state.score++;
  document.getElementById('scoreText').textContent = `得分：${state.score}`;
  const q = state.questions[state.currentIndex];
  // Add next button for essay
  const essayArea = document.querySelector('.essay-area');
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn visible';
  nextBtn.style.marginTop = '10px';
  nextBtn.textContent = '下一题 →';
  nextBtn.onclick = nextQuestion;
  essayArea.parentNode.parentNode.appendChild(nextBtn);
  const fb = document.getElementById('feedback');
  fb.className = `feedback visible ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `<div class="feedback-label">${correct ? '✅ 很好，继续加油！' : '❌ 没关系，再看看解析'}</div>
    <div class="explanation">📖 ${q.explanation}</div>`;
}

function nextQuestion() {
  state.currentIndex++;
  renderQuestion();
  window.scrollTo(0, 0);
}

function showSummary() {
  const pct = state.total > 0 ? Math.round(state.score / state.total * 100) : 0;
  document.getElementById('finalScore').textContent = pct + '%';
  let msg = pct >= 90 ? '优秀！你已掌握大部分内容 🎉' : pct >= 70 ? '良好！继续努力，查漏补缺 💪' : '加油！建议重新复习手册后再来一轮 📚';
  document.getElementById('summaryDetail').textContent = `答对 ${state.score} 题 / 共 ${state.total} 题 · ${msg}`;
  document.getElementById('summary').classList.add('visible');
  window.scrollTo(0, 0);
}

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    state.filter = this.dataset.filter;
    init();
  });
});

// Start
init();
</script>
