<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市场功底测刷题系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f0f4f8; min-height: 100vh; }

/* Gate */
.gate-wrap { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 24px; }
.gate-box { background: white; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.gate-box .gate-icon { font-size: 48px; margin-bottom: 12px; }
.gate-box h2 { font-size: 18px; color: #2d3748; margin-bottom: 6px; }
.gate-box .gate-q { font-size: 15px; color: #4a5568; margin: 16px 0 12px; line-height: 1.6; background: #f7fafc; border-radius: 10px; padding: 12px 16px; }
.gate-input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; margin-bottom: 12px; text-align: center; transition: border-color 0.2s; }
.gate-input:focus { border-color: #667eea; }
.gate-input.shake { animation: shake 0.4s; border-color: #e53e3e; }
.gate-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.gate-err { font-size: 13px; color: #e53e3e; margin-top: 8px; min-height: 18px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

/* Header */
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 20px; text-align: center; }
.header h1 { font-size: 18px; font-weight: 700; }
.header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }

/* Mode tabs */
.mode-tabs { background: white; display: flex; border-bottom: 2px solid #e2e8f0; }
.mode-tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 14px; font-weight: 600; color: #a0aec0; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.mode-tab.active { color: #667eea; border-bottom-color: #667eea; }
.mode-tab .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

/* Filter bar */
.filter-bar { background: white; padding: 10px 12px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 10; }
.filter-btn { padding: 5px 10px; border-radius: 20px; border: 1.5px solid #cbd5e0; background: white; font-size: 12px; cursor: pointer; transition: all 0.2s; color: #4a5568; }
.filter-btn.active { background: #667eea; border-color: #667eea; color: white; }
.filter-btn:hover:not(.active) { border-color: #667eea; color: #667eea; }

/* Progress */
.progress-bar { background: white; padding: 10px 16px; border-bottom: 1px solid #e2e8f0; }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: #718096; margin-bottom: 6px; }
.progress-track { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 3px; transition: width 0.4s ease; }

/* Main */
.main { padding: 16px; max-width: 680px; margin: 0 auto; }

/* Question card */
.question-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
.q-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.q-tag { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
.tag-single { background: #ebf4ff; color: #3182ce; }
.tag-judge { background: #f0fff4; color: #38a169; }
.tag-fill { background: #fffaf0; color: #dd6b20; }
.tag-multi { background: #faf5ff; color: #805ad5; }
.tag-chapter { background: #f7fafc; color: #718096; }
.tag-wrong { background: #fff5f5; color: #e53e3e; }
.q-text { font-size: 16px; line-height: 1.7; color: #2d3748; font-weight: 500; }

/* Options */
.options { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
.option-btn { width: 100%; text-align: left; padding: 12px 16px; border-radius: 10px; border: 2px solid #e2e8f0; background: white; font-size: 14px; cursor: pointer; transition: all 0.2s; color: #4a5568; line-height: 1.5; }
.option-btn:hover:not(:disabled) { border-color: #667eea; background: #ebf4ff; color: #3182ce; }
.option-btn.correct { border-color: #38a169; background: #f0fff4; color: #276749; font-weight: 600; }
.option-btn.wrong { border-color: #e53e3e; background: #fff5f5; color: #c53030; }
.option-btn.reveal { border-color: #38a169; background: #f0fff4; color: #276749; opacity: 0.7; }
.option-btn:disabled { cursor: default; }

/* Judge */
.judge-btns { margin-top: 16px; display: flex; gap: 12px; }
.judge-btn { flex: 1; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; background: white; font-size: 20px; cursor: pointer; transition: all 0.2s; }
.judge-btn:hover:not(:disabled) { border-color: #667eea; background: #ebf4ff; }
.judge-btn.correct { border-color: #38a169; background: #f0fff4; }
.judge-btn.wrong { border-color: #e53e3e; background: #fff5f5; }
.judge-btn:disabled { cursor: default; }

/* Fill */
.fill-area { margin-top: 16px; }
.fill-input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; }
.fill-input:focus { border-color: #667eea; }
.fill-input.correct { border-color: #38a169; background: #f0fff4; }
.fill-input.wrong { border-color: #e53e3e; background: #fff5f5; }
.fill-submit { margin-top: 10px; width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
.fill-submit:hover { background: #5a67d8; }
.fill-submit:disabled { background: #a0aec0; cursor: default; }

/* Multi-select */
.multi-hint { margin-top: 10px; font-size: 12px; color: #805ad5; background: #faf5ff; border-radius: 8px; padding: 6px 12px; display: inline-block; }
.option-btn.selected { border-color: #805ad5; background: #faf5ff; color: #553c9a; font-weight: 600; }
.option-btn.selected:hover:not(:disabled) { border-color: #805ad5; background: #faf5ff; color: #553c9a; }
.multi-submit { margin-top: 12px; width: 100%; padding: 12px; background: #805ad5; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
.multi-submit:hover { background: #6b46c1; }
.multi-submit:disabled { background: #a0aec0; cursor: default; }

/* Feedback */
.feedback { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 14px; line-height: 1.6; display: none; }
.feedback.visible { display: block; }
.feedback.correct-fb { background: #f0fff4; border-left: 4px solid #38a169; color: #276749; }
.feedback.wrong-fb { background: #fff5f5; border-left: 4px solid #e53e3e; color: #c53030; }
.feedback-label { font-weight: 700; margin-bottom: 4px; }
.explanation { color: #4a5568; font-size: 13px; margin-top: 6px; line-height: 1.6; }

/* Next btn */
.next-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; display: none; margin-top: 4px; box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
.next-btn.visible { display: block; }

/* Summary */
.summary { background: white; border-radius: 16px; padding: 30px 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: none; }
.summary.visible { display: block; }
.summary-score { font-size: 56px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.summary-text { font-size: 16px; color: #4a5568; margin: 8px 0 6px; }
.summary-detail { font-size: 14px; color: #718096; margin-bottom: 24px; }
.summary-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.restart-btn { padding: 13px 28px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
.wrong-review-btn { padding: 13px 28px; background: white; color: #e53e3e; border: 2px solid #e53e3e; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 700; }
.wrong-review-btn:disabled { opacity: 0.4; cursor: default; }

/* Home screen */
.home { padding: 20px 16px; max-width: 680px; margin: 0 auto; }
.mode-card { background: white; border-radius: 16px; padding: 24px 20px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; border: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 16px; }
.mode-card:hover { border-color: #667eea; transform: translateY(-2px); }
.mode-card .card-icon { font-size: 36px; flex-shrink: 0; }
.mode-card .card-body h3 { font-size: 17px; color: #2d3748; margin-bottom: 4px; }
.mode-card .card-body p { font-size: 13px; color: #718096; line-height: 1.5; }
.mode-card .card-arrow { margin-left: auto; font-size: 20px; color: #a0aec0; flex-shrink: 0; }
.wrong-count-badge { background: #e53e3e; color: white; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 700; margin-left: 8px; }

/* Exam mode */
.exam-settings { background: white; border-radius: 16px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.exam-settings h3 { font-size: 15px; color: #2d3748; margin-bottom: 14px; font-weight: 600; }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.setting-row label { font-size: 14px; color: #4a5568; }
.setting-row select { padding: 6px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
.start-exam-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #f6ad55, #ed8936); color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 12px rgba(237,137,54,0.4); }

/* Exam score display */
.score-ring { width: 120px; height: 120px; margin: 0 auto 16px; position: relative; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.score-ring-num { font-size: 28px; font-weight: 800; color: #2d3748; line-height: 1; }
.score-ring-label { font-size: 11px; color: #718096; }

/* Wrong book empty */
.empty-state { text-align: center; padding: 50px 20px; color: #a0aec0; }
.empty-state .icon { font-size: 52px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }
</style>
</head>
<body>

<!-- 登录门 -->
<div class="gate-wrap" id="gate">
  <div class="gate-box">
    <div class="gate-icon">🔐</div>
    <h2>验证身份</h2>
    <div class="gate-q">人文组吴彦祖是谁？</div>
    <input class="gate-input" id="gateInput" type="text" placeholder="请输入答案..." maxlength="20">
    <button class="gate-btn" id="gateBtn">进入</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="header">
  <h1>📚 市场功底测刷题系统</h1>
  <p>2026年上小学市场 · 备考必胜</p>
</div>

<!-- Mode Tabs -->
<div class="mode-tabs">
  <div class="mode-tab active" onclick="switchTab('home')" id="tab-home">
    <span class="tab-icon">🏠</span>首页
  </div>
  <div class="mode-tab" onclick="switchTab('practice')" id="tab-practice">
    <span class="tab-icon">📖</span>刷题
  </div>
  <div class="mode-tab" onclick="switchTab('exam')" id="tab-exam">
    <span class="tab-icon">📝</span>考试
  </div>
  <div class="mode-tab" onclick="switchTab('wrong')" id="tab-wrong">
    <span class="tab-icon">❌</span>错题本
  </div>
</div>

<!-- HOME -->
<div id="page-home" class="home">
  <div class="mode-card" onclick="switchTab('practice')">
    <div class="card-icon">📖</div>
    <div class="card-body">
      <h3>刷题模式</h3>
      <p>按章节练习，答错即时解析，打好知识基础</p>
    </div>
    <div class="card-arrow">›</div>
  </div>
  <div class="mode-card" onclick="switchTab('exam')">
    <div class="card-icon">📝</div>
    <div class="card-body">
      <h3>考试模式</h3>
      <p>随机抽题，百分制评分，模拟真实考试</p>
    </div>
    <div class="card-arrow">›</div>
  </div>
  <div class="mode-card" onclick="switchTab('wrong')">
    <div class="card-icon">❌</div>
    <div class="card-body">
      <h3>错题本 <span class="wrong-count-badge" id="homeWrongCount">0</span></h3>
      <p>专项攻克薄弱知识点，加深记忆</p>
    </div>
    <div class="card-arrow">›</div>
  </div>
</div>

<!-- PRACTICE -->
<div id="page-practice" style="display:none;">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="ch1">第一章·学情</button>
    <button class="filter-btn" data-filter="ch2">第二章·产品价格</button>
    <button class="filter-btn" data-filter="ch3">第三章·亮点功能</button>
    <button class="filter-btn" data-filter="ch4">第四章·竞品</button>
  </div>
  <div class="progress-bar">
    <div class="progress-info">
      <span id="progressText">第 1 题 / 共 0 题</span>
      <span id="scoreText">得分：0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="main">
    <div id="quizArea"></div>
    <div class="summary" id="practiceSummary">
      <div class="summary-score" id="practiceScore">0%</div>
      <div class="summary-text">本轮刷题完成！</div>
      <div class="summary-detail" id="practiceDetail"></div>
      <div class="summary-btns">
        <button class="restart-btn" onclick="initPractice()">🔄 再来一轮</button>
        <button class="wrong-review-btn" id="practiceWrongBtn" onclick="switchTab('wrong')">❌ 查看错题</button>
      </div>
    </div>
  </div>
</div>

<!-- EXAM -->
<div id="page-exam" style="display:none;">
  <div class="main" id="examMain">
    <div class="exam-settings">
      <h3>⚙️ 考试设置</h3>
      <div class="setting-row">
        <label>题目数量</label>
        <select id="examCount">
          <option value="10">10题</option>
          <option value="20" selected>20题</option>
          <option value="30">30题</option>
          <option value="999">全部题目</option>
        </select>
      </div>
      <div class="setting-row">
        <label>章节范围</label>
        <select id="examChapter">
          <option value="all">全部章节</option>
          <option value="ch1">第一章·校内学情</option>
          <option value="ch2">第二章·产品价格</option>
          <option value="ch3">第三章·亮点功能</option>
          <option value="ch4">第四章·竞品分析</option>
        </select>
      </div>
    </div>
    <button class="start-exam-btn" onclick="startExam()">🚀 开始考试</button>
  </div>
  <div id="examQuizArea" style="display:none;">
    <div class="progress-bar">
      <div class="progress-info">
        <span id="examProgressText">第 1 题 / 共 0 题</span>
        <span id="examScoreText" style="color:#ed8936;font-weight:600;">考试中</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="examProgressFill" style="width:0%;background:linear-gradient(90deg,#f6ad55,#ed8936)"></div></div>
    </div>
    <div class="main">
      <div id="examArea"></div>
      <div class="summary" id="examSummary">
        <div class="score-ring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" fill="none" stroke="#e2e8f0" stroke-width="10"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="#ed8936" stroke-width="10" stroke-dasharray="314" stroke-dashoffset="314" id="examRingFill" style="transition:stroke-dashoffset 1s ease;"/>
          </svg>
          <div class="score-ring-text">
            <div class="score-ring-num" id="examFinalNum">0</div>
            <div class="score-ring-label">分</div>
          </div>
        </div>
        <div class="summary-text" id="examGrade"></div>
        <div class="summary-detail" id="examDetail"></div>
        <div class="summary-btns">
          <button class="restart-btn" onclick="resetExam()">🔄 再考一次</button>
          <button class="wrong-review-btn" id="examWrongBtn" onclick="switchTab('wrong')">❌ 查看错题</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- WRONG BOOK -->
<div id="page-wrong" style="display:none;">
  <div class="main" id="wrongMain"></div>
</div>

<script>
// ==================== 题库 ====================
const QUESTIONS = [
  // ===== 第一章：校内学情·语文 =====
  {id:1,chapter:'ch1',type:'single',q:'语文在九年总课时中占比是多少？',options:['A. 13%~15%','B. 20%~22%','C. 6%~8%','D. 17%~19%'],answer:1,explanation:'语文排课量最高，占到九年总课量的20%~22%。'},
  {id:2,chapter:'ch1',type:'fill',q:'语文在九年总课时中占比是多少？（填写范围）',answers:['20%-22%','20%~22%','20%到22%'],explanation:'语文排课量最高，占到九年总课量的20%~22%。'},
  {id:3,chapter:'ch1',type:'single',q:'小学每学年共多少周？一至六年级新授课时间多少周？',options:['A. 共39周，新授课35周','B. 共40周，新授课36周','C. 共38周，新授课34周','D. 共41周，新授课37周'],answer:0,explanation:'每学年共39周：一至六年级新授课35周，复习考试2周，学校机动2周。'},
  {id:4,chapter:'ch1',type:'fill',q:'2026春季学期共有多少周？往年通常是多少周？',answers:['18周','18'],explanation:'2026春季是史上最短学期，仅有18周，往年约20周，校内节奏明显加快。'},
  {id:5,chapter:'ch1',type:'judge',q:'2026春起，小学一、二年级不组织任何纸笔考试；其他年级每学期仅1次期末考试。',answer:true,explanation:'正确。2026春起全国执行考试新政：①一二年级不组织任何纸笔考试；②其他年级每学期仅1次期末考试；③必须依据课标命题，增加应用性、探究性试题。'},
  {id:6,chapter:'ch1',type:'single',q:'1~2年级课外阅读总量不少于多少字？背诵篇数是多少？',options:['A. 5万字，背诵50篇','B. 10万字，背诵50篇','C. 5万字，背诵30篇','D. 20万字，背诵60篇'],answer:0,explanation:'1~2年级：课外阅读不少于5万字，背诵优秀古诗文50篇（段）。'},
  {id:7,chapter:'ch1',type:'single',q:'3~4年级课外阅读总量不少于多少字？是1~2年级的几倍？',options:['A. 20万字，4倍','B. 30万字，6倍','C. 40万字，8倍','D. 50万字，10倍'],answer:2,explanation:'3~4年级课外阅读不少于40万字，是1~2年级（5万字）的8倍，背诵优秀诗文50篇。'},
  {id:8,chapter:'ch1',type:'single',q:'5~6年级课外阅读总量不少于多少字？背诵篇数是多少？',options:['A. 80万字，50篇','B. 100万字，60篇','C. 80万字，60篇','D. 100万字，50篇'],answer:1,explanation:'5~6年级课外阅读不少于100万字，背诵优秀诗文60篇（段）。'},
  {id:9,chapter:'ch1',type:'fill',q:'3~4年级课外阅读总量不少于多少万字？',answers:['40万字','40'],explanation:'3~4年级课外阅读不少于40万字，是1~2年级的8倍。'},

  {id:17,chapter:'ch1',type:'judge',q:'"三年级陷阱"指一二年级90分以上占比约80%，三年级后降至约57%。',answer:true,explanation:'正确。一二年级90分以上占80%，三年级后降至57%。三个原因：知识点增多难度变大；题目综合性变强；一二年级无书面考试问题未暴露。'},

  {id:22,chapter:'ch1',type:'fill',q:'数学高段（5~6年级）有多少比例学生在60分以下？',answers:['5%~8%','5%-8%'],explanation:'高段5%~8%在60分以下，约一半学生达不到90分。'},

// ==================== 错题本（localStorage）====================
function getWrongBook() {
  try { return JSON.parse(localStorage.getItem('wrongBook') || '[]'); } catch(e) { return []; }
}
function saveWrongBook(book) {
  localStorage.setItem('wrongBook', JSON.stringify(book));
}
function addToWrongBook(qid) {
  const book = getWrongBook();
  if (!book.includes(qid)) { book.push(qid); saveWrongBook(book); }
}
function removeFromWrongBook(qid) {
  const book = getWrongBook().filter(id => id !== qid);
  saveWrongBook(book);
}
function isInWrongBook(qid) {
  return getWrongBook().includes(qid);
}

// ==================== Tab切换 ====================
const pages = ['home','practice','exam','wrong'];
function switchTab(name) {
  pages.forEach(p => {
    document.getElementById('page-'+p).style.display = p===name ? 'block' : 'none';
    document.getElementById('tab-'+p).classList.toggle('active', p===name);
  });
  if (name === 'wrong') renderWrongBook();
  if (name === 'home') updateHomeWrongCount();
}

function updateHomeWrongCount() {
  const c = getWrongBook().length;
  document.getElementById('homeWrongCount').textContent = c;
}

// ==================== 刷题模式 ====================
let pState = { filter:'all', questions:[], currentIndex:0, score:0, total:0, answered:false, sessionWrong:[] };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function initPractice() {
  let qs = pState.filter==='all' ? [...QUESTIONS] : QUESTIONS.filter(q=>q.chapter===pState.filter);
  pState.questions = shuffle(qs);
  pState.currentIndex = 0; pState.score = 0; pState.total = pState.questions.length;
  pState.answered = false; pState.sessionWrong = [];
  document.getElementById('practiceSummary').classList.remove('visible');
  updatePracticeProgress();
  renderPracticeQuestion();
}

function updatePracticeProgress() {
  const q=pState.currentIndex, t=pState.total;
  document.getElementById('progressText').textContent = `第 ${q+1} 题 / 共 ${t} 题`;
  document.getElementById('scoreText').textContent = `得分：${pState.score}`;
  document.getElementById('progressFill').style.width = (t>0?q/t*100:0)+'%';
}

function renderPracticeQuestion() {
  const area = document.getElementById('quizArea');
  if (pState.currentIndex >= pState.total) { showPracticeSummary(); area.innerHTML=''; return; }
  pState.answered = false;
  const q = pState.questions[pState.currentIndex];
  updatePracticeProgress();
  area.innerHTML = buildQuestionHTML(q, 'practice');
  if (q.type==='fill') {
    document.getElementById('fillInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitFill('practice'); });
  }
}

function showPracticeSummary() {
  const pct = pState.total>0 ? Math.round(pState.score/pState.total*100) : 0;
  document.getElementById('practiceScore').textContent = pct+'%';
  let msg = pct>=90?'优秀！🎉':pct>=70?'良好！💪':'加油！📚';
  document.getElementById('practiceDetail').textContent = `答对 ${pState.score} 题 / 共 ${pState.total} 题 · ${msg}`;
  document.getElementById('practiceSummary').classList.add('visible');
  const wBtn = document.getElementById('practiceWrongBtn');
  wBtn.disabled = getWrongBook().length === 0;
  updateHomeWrongCount();
  window.scrollTo(0,0);
}

// ==================== 考试模式 ====================
let eState = { questions:[], currentIndex:0, score:0, total:0, answered:false, sessionWrong:[] };

function startExam() {
  const count = parseInt(document.getElementById('examCount').value);
  const chapter = document.getElementById('examChapter').value;
  let pool = chapter==='all' ? [...QUESTIONS] : QUESTIONS.filter(q=>q.chapter===chapter);
  pool = shuffle(pool);
  eState.questions = pool.slice(0, Math.min(count, pool.length));
  eState.currentIndex=0; eState.score=0; eState.total=eState.questions.length;
  eState.answered=false; eState.sessionWrong=[];
  document.getElementById('examMain').style.display='none';
  document.getElementById('examQuizArea').style.display='block';
  document.getElementById('examSummary').classList.remove('visible');
  updateExamProgress();
  renderExamQuestion();
}

function resetExam() {
  document.getElementById('examMain').style.display='block';
  document.getElementById('examQuizArea').style.display='none';
}

function updateExamProgress() {
  const q=eState.currentIndex, t=eState.total;
  document.getElementById('examProgressText').textContent = `第 ${q+1} 题 / 共 ${t} 题`;
  document.getElementById('examProgressFill').style.width = (t>0?q/t*100:0)+'%';
}

function renderExamQuestion() {
  const area = document.getElementById('examArea');
  if (eState.currentIndex >= eState.total) { showExamSummary(); area.innerHTML=''; return; }
  eState.answered=false;
  const q = eState.questions[eState.currentIndex];
  updateExamProgress();
  area.innerHTML = buildQuestionHTML(q, 'exam');
  if (q.type==='fill') {
    document.getElementById('fillInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitFill('exam'); });
  }
}

function showExamSummary() {
  const t=eState.total, s=eState.score;
  const pct = t>0?Math.round(s/t*100):0;
  // 百分制
  document.getElementById('examFinalNum').textContent = pct;
  // Ring animation
  const circumference = 2*Math.PI*50;
  const offset = circumference*(1-pct/100);
  setTimeout(()=>{ document.getElementById('examRingFill').style.strokeDashoffset = offset; }, 100);
  let grade = pct>=90?'优秀 🎉':pct>=80?'良好 👍':pct>=60?'及格 💪':'不及格，再加把劲 📚';
  document.getElementById('examGrade').textContent = grade;
  document.getElementById('examDetail').textContent = `答对 ${s} 题 / 共 ${t} 题 · 得分 ${pct} 分`;
  document.getElementById('examSummary').classList.add('visible');
  const wBtn = document.getElementById('examWrongBtn');
  wBtn.disabled = getWrongBook().length === 0;
  updateHomeWrongCount();
  window.scrollTo(0,0);
}

// ==================== 错题本模式 ====================
let wrongState = { questions:[], currentIndex:0, score:0, total:0, answered:false };

function renderWrongBook() {
  const main = document.getElementById('wrongMain');
  const wrongIds = getWrongBook();
  updateHomeWrongCount();
  if (wrongIds.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>错题本是空的，继续加油！</p></div>`;
    return;
  }
  const wrongQs = QUESTIONS.filter(q=>wrongIds.includes(q.id));
  main.innerHTML = `
    <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:14px;">
      <div style="font-size:15px;font-weight:600;color:#2d3748;margin-bottom:6px;">❌ 错题本</div>
      <div style="font-size:13px;color:#718096;margin-bottom:16px;">共 ${wrongQs.length} 道错题，专项练习加深记忆</div>
      <button onclick="startWrongPractice()" style="width:100%;padding:13px;background:linear-gradient(135deg,#fc8181,#e53e3e);color:white;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:700;">🔁 开始练习错题</button>
    </div>
    <div id="wrongQuizArea"></div>
    <div class="summary" id="wrongSummary">
      <div class="summary-score" id="wrongFinalScore" style="background:linear-gradient(135deg,#fc8181,#e53e3e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">0%</div>
      <div class="summary-text">错题练习完成！</div>
      <div class="summary-detail" id="wrongDetail"></div>
      <div class="summary-btns">
        <button class="restart-btn" style="background:linear-gradient(135deg,#fc8181,#e53e3e);" onclick="startWrongPractice()">🔄 再练一遍</button>
      </div>
    </div>
  `;
}

function startWrongPractice() {
  const wrongIds = getWrongBook();
  const wrongQs = shuffle(QUESTIONS.filter(q=>wrongIds.includes(q.id)));
  wrongState = { questions:wrongQs, currentIndex:0, score:0, total:wrongQs.length, answered:false };
  document.getElementById('wrongSummary').classList.remove('visible');
  renderWrongQuestion();
}

function renderWrongQuestion() {
  const area = document.getElementById('wrongQuizArea');
  if (!area) return;
  if (wrongState.currentIndex >= wrongState.total) { showWrongSummary(); area.innerHTML=''; return; }
  wrongState.answered=false;
  const q = wrongState.questions[wrongState.currentIndex];
  area.innerHTML = buildQuestionHTML(q, 'wrong');
  if (q.type==='fill') {
    document.getElementById('fillInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitFill('wrong'); });
  }
}

function showWrongSummary() {
  const pct = wrongState.total>0?Math.round(wrongState.score/wrongState.total*100):0;
  document.getElementById('wrongFinalScore').textContent = pct+'%';
  document.getElementById('wrongDetail').textContent = `答对 ${wrongState.score} / ${wrongState.total} 题`;
  document.getElementById('wrongSummary').classList.add('visible');
  updateHomeWrongCount();
  window.scrollTo(0,0);
}

// ==================== 构建题目HTML ====================
function buildQuestionHTML(q, mode) {
  let inputHtml = '';
  if (q.type==='single') {
    inputHtml = `<div class="options">${q.options.map((opt,i)=>`<button class="option-btn" data-action="answer-single" data-idx="${i}" data-mode="${mode}">${opt}</button>`).join('')}</div>`;
  } else if (q.type==='judge') {
    inputHtml = `<div class="judge-btns">
      <button class="judge-btn" data-action="answer-judge" data-val="true" data-mode="${mode}">✅ 正确</button>
      <button class="judge-btn" data-action="answer-judge" data-val="false" data-mode="${mode}">❌ 错误</button>
    </div>`;
  } else if (q.type==='fill') {
    inputHtml = `<div class="fill-area">
      <input type="text" class="fill-input" id="fillInput" placeholder="请输入答案...">
      <button class="fill-submit" data-action="submit-fill" data-mode="${mode}">提交答案</button>
    </div>`;
  } else if (q.type==='multi') {
    inputHtml = `<div class="options" id="multiOptions">${q.options.map((opt,i)=>`<button class="option-btn" data-action="toggle-multi" data-idx="${i}">${opt}</button>`).join('')}</div>
      <div class="multi-hint">多选题：请选择所有正确答案</div>
      <button class="multi-submit" data-action="submit-multi" data-mode="${mode}">提交答案</button>`;
  }
  const wrongTag = isInWrongBook(q.id) ? '<span class="q-tag tag-wrong">错题</span>' : '';
  return `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag ${typeClass(q.type)}">${typeLabel(q.type)}</span>
        <span class="q-tag tag-chapter">${chapterLabel(q.chapter)}</span>
        ${wrongTag}
      </div>
      <div class="q-text">${q.q}</div>
      ${inputHtml}
      <div class="feedback" data-fb="${mode}"></div>
    </div>
    <button class="next-btn" data-action="next" data-mode="${mode}">下一题 →</button>
  `;
}

function typeLabel(t){return{single:'单选题',judge:'判断题',fill:'填空题',multi:'多选题'}[t]||t;}
function typeClass(t){return{single:'tag-single',judge:'tag-judge',fill:'tag-fill',multi:'tag-multi'}[t]||'';}
function chapterLabel(c){return{ch1:'第一章·学情',ch2:'第二章·产品',ch3:'第三章·亮点',ch4:'第四章·竞品'}[c]||c;}

function getState(mode){ return mode==='practice'?pState:mode==='exam'?eState:wrongState; }

function showFeedback(correct, explanation, qid, mode) {
  const fb = document.querySelector(`.feedback[data-fb="${mode}"]`);
  if(fb){
    fb.className=`feedback visible ${correct?'correct-fb':'wrong-fb'}`;
    fb.innerHTML=`<div class="feedback-label">${correct?'✅ 回答正确！':'❌ 回答错误'}</div><div class="explanation">📖 解析：${explanation}</div>`;
  }
  if(!correct) addToWrongBook(qid);
  else if(mode==='wrong') removeFromWrongBook(qid);
  const nb = document.querySelector(`.next-btn[data-mode="${mode}"]`);
  if(nb) nb.classList.add('visible');
  window.scrollTo(0, document.body.scrollHeight);
}

function toggleMulti(btn) {
  const submitBtn = document.querySelector('.multi-submit');
  if (submitBtn && submitBtn.disabled) return;
  btn.classList.toggle('selected');
}

function submitMulti(mode) {
  const st = getState(mode); if (st.answered) return;
  const selected = Array.from(document.querySelectorAll('#multiOptions .option-btn.selected')).map(b => parseInt(b.dataset.idx));
  if (selected.length === 0) return;
  st.answered = true;
  const q = st.questions[st.currentIndex];
  const correct = selected.length === q.answers.length && q.answers.every(a => selected.includes(a));
  // 禁用提交按钮
  const submitBtn = document.querySelector('.multi-submit');
  if (submitBtn) submitBtn.disabled = true;
  // 染色选项
  document.querySelectorAll('#multiOptions .option-btn').forEach((b, i) => {
    b.disabled = true;
    const isCorrectChoice = q.answers.includes(i);
    const isSelected = selected.includes(i);
    if (isCorrectChoice) b.classList.add('correct');
    else if (isSelected && !isCorrectChoice) b.classList.add('wrong');
  });
  if (correct) st.score++;
  if (mode === 'practice') document.getElementById('scoreText').textContent = `得分：${st.score}`;
  showFeedback(correct, q.explanation, q.id, mode);
}

function answerSingle(btn, idx, mode) {
  const st=getState(mode); if(st.answered)return;
  st.answered=true;
  const q=st.questions[st.currentIndex];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const correct=idx===q.answer;
  btn.classList.add(correct?'correct':'wrong');
  if(!correct) document.querySelectorAll('.option-btn')[q.answer].classList.add('reveal');
  if(correct)st.score++;
  if(mode==='practice') document.getElementById('scoreText').textContent=`得分：${st.score}`;
  showFeedback(correct,q.explanation,q.id,mode);
}

function answerJudge(btn, val, mode) {
  const st=getState(mode); if(st.answered)return;
  st.answered=true;
  const q=st.questions[st.currentIndex];
  document.querySelectorAll('.judge-btn').forEach(b=>b.disabled=true);
  const correct=val===q.answer;
  btn.classList.add(correct?'correct':'wrong');
  if(!correct) document.querySelectorAll('.judge-btn')[q.answer?0:1].classList.add('correct');
  if(correct)st.score++;
  if(mode==='practice') document.getElementById('scoreText').textContent=`得分：${st.score}`;
  showFeedback(correct,q.explanation,q.id,mode);
}

function submitFill(mode) {
  const st=getState(mode); if(st.answered)return;
  const input=document.getElementById('fillInput');
  const val=input.value.trim(); if(!val)return;
  st.answered=true;
  input.disabled=true;
  document.querySelector('.fill-submit').disabled=true;
  const q=st.questions[st.currentIndex];
  const normalize=s=>s.replace(/\s/g,'').toLowerCase();
  const correct=q.answers.some(a=>normalize(val)===normalize(a));
  input.classList.add(correct?'correct':'wrong');
  if(!correct){
    const hint=document.createElement('div');
    hint.style.cssText='margin-top:8px;font-size:13px;color:#718096;';
    hint.textContent=`参考答案：${q.answers[0]}`;
    input.parentNode.appendChild(hint);
  }
  if(correct)st.score++;
  if(mode==='practice') document.getElementById('scoreText').textContent=`得分：${st.score}`;
  showFeedback(correct,q.explanation,q.id,mode);
}


function nextQuestion(mode) {
  const st=getState(mode);
  st.currentIndex++;
  if(mode==='practice') renderPracticeQuestion();
  else if(mode==='exam') renderExamQuestion();
  else if(mode==='wrong') renderWrongQuestion();
  window.scrollTo(0,0);
}

// ==================== 刷题过滤器 ====================
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    pState.filter=this.dataset.filter;
    initPractice();
  });
});

// ==================== 事件委托：所有动态按钮 ====================
document.body.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const mode = btn.dataset.mode;
  const action = btn.dataset.action;
  if (action === 'next') { nextQuestion(mode); return; }
  if (action === 'submit-fill') { submitFill(mode); return; }
  if (action === 'submit-multi') { submitMulti(mode); return; }
  if (action === 'toggle-multi') { toggleMulti(btn); return; }
  if (action === 'answer-single') { answerSingle(btn, parseInt(btn.dataset.idx), mode); return; }
  if (action === 'answer-judge') { answerJudge(btn, btn.dataset.val === 'true', mode); return; }
});

// ==================== 登录门 ====================
(function() {
  const gate = document.getElementById('gate');
  const input = document.getElementById('gateInput');
  const btn = document.getElementById('gateBtn');
  const err = document.getElementById('gateErr');
  const ANSWER = '李祎璠';

  if (sessionStorage.getItem('quizAuthed') === '1') {
    gate.style.display = 'none';
  }

  function tryEnter() {
    const val = input.value.trim();
    if (val === ANSWER) {
      sessionStorage.setItem('quizAuthed', '1');
      gate.style.display = 'none';
    } else {
      err.textContent = '答案不对，再想想 🤔';
      input.classList.add('shake');
      input.value = '';
      setTimeout(() => input.classList.remove('shake'), 500);
    }
  }

  btn.addEventListener('click', tryEnter);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryEnter(); });
})();

// ==================== 初始化 ====================
switchTab('home');
initPractice();
updateHomeWrongCount();
</script>
</body>
</html>
